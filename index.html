<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apolo | Reservas de Lujo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="glass-container">
        <header>
            <h1 class="logo">APOLO</h1>
            <p class="subtitle">Reserva tu mesa para una noche inolvidable</p>
        </header>

        <form id="formulario-reserva">
            <div class="input-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Nombre y Apellidos" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" required>
                </div>
                <div class="input-group">
                    <label for="personas">Comensales</label>
                    <input type="number" id="personas" min="1" max="10" value="2" required>
                </div>
            </div>

            <button type="submit" id="btn-reservar">Confirmar Experiencia</button>
        </form>

        <div id="mensaje-confirmacion" class="hidden">
            <div class="success-icon">✓</div>
            <h3>¡Reserva Confirmada!</h3>
            <p id="detalles-reserva"></p>
            <button class="btn-secundario" onclick="reiniciarApp()">Nueva Reserva</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
